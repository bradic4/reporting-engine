<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming DW — Sign In</title>
    <meta name="description" content="Sign in to the Gaming DW Marketing Analytics Workbench">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #080b14;
            --bg-card: #111827;
            --bg-secondary: #0d1121;
            --border: rgba(255, 255, 255, 0.07);
            --border-accent: rgba(255, 255, 255, 0.14);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-blue: #4f8cff;
            --accent-blue-bright: #60a5fa;
            --accent-blue-dim: rgba(79, 140, 255, 0.12);
            --accent-red: #f87171;
            --gradient-blue: linear-gradient(135deg, #4f8cff 0%, #6366f1 100%);
            --radius: 16px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Animated background */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: #4f8cff;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .bg-orb-2 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            bottom: -100px;
            right: -100px;
            animation-delay: -3s;
        }

        .bg-orb-3 {
            width: 300px;
            height: 300px;
            background: #22d3ee;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -6s;
            opacity: 0.06;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 140, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 140, 255, 0.025) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-10px, 15px) scale(0.97); }
        }

        /* Login wrapper */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Brand strip above card */
        .brand-strip {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            font-size: 3rem;
            display: inline-block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(79, 140, 255, 0.5));
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            display: block;
        }

        .brand-sub {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Card */
        .login-card {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(79, 140, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gradient-blue);
            opacity: 0.8;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: rgba(13, 17, 33, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            background: rgba(79, 140, 255, 0.04);
            box-shadow: 0 0 0 3px var(--accent-blue-dim), 0 0 20px rgba(79, 140, 255, 0.08);
        }

        .form-group input:focus ~ .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--accent-blue);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        /* submit button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gradient-blue);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: var(--font);
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(79, 140, 255, 0.35);
            margin-top: 8px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 140, 255, 0.5);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(79, 140, 255, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading spinner inside button */
        .btn-login.loading .btn-text { opacity: 0; }
        .btn-login.loading::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Error */
        .error-msg {
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.25);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-msg.visible {
            display: flex;
            animation: shake 0.4s ease;
        }

        .error-icon { font-size: 1rem; flex-shrink: 0; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Footer note */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.3px;
        }

        .version-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-top: 8px;
            opacity: 0.5;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34d399;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5); }
            50% { box-shadow: 0 0 0 5px rgba(52, 211, 153, 0); }
        }
    </style>
</head>

<body>
    <div class="bg-effects">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-grid"></div>
    </div>

    <div class="login-wrapper">
        <div class="brand-strip">
            <span class="brand-icon">🎰</span>
            <span class="brand-name">Gaming DW</span>
            <p class="brand-sub">Marketing Analytics Workbench</p>
        </div>

        <div class="login-card">
            <h1 class="card-title">Welcome back</h1>
            <p class="card-subtitle">Sign in to access your dashboard</p>

            <div class="error-msg" id="error-msg" role="alert">
                <span class="error-icon">⚠</span>
                <span id="error-text">Invalid username or password</span>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username"
                            placeholder="Enter your username"
                            required autocomplete="username" autofocus>
                        <span class="input-icon">👤</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password"
                            placeholder="Enter your password"
                            required autocomplete="current-password">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btn-login">
                    <span class="btn-text">Sign In →</span>
                </button>
            </form>
        </div>

        <div class="login-footer">
            <div>Secure authentication · Session expires after 8 hours</div>
            <div class="version-tag">
                <span class="status-dot"></span>
                All systems operational
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errEl = document.getElementById('error-msg');
        const errText = document.getElementById('error-text');
        const btn = document.getElementById('btn-login');

        function showError(msg) {
            errText.textContent = msg;
            errEl.classList.add('visible');
        }

        function hideError() {
            errEl.classList.remove('visible');
        }

        function setLoading(loading) {
            btn.disabled = loading;
            btn.classList.toggle('loading', loading);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    let msg = 'Invalid credentials';
                    try {
                        const data = await res.json();
                        msg = data.error || msg;
                    } catch { }
                    showError(msg);
                    setLoading(false);
                }
            } catch {
                showError('Connection error — please try again');
                setLoading(false);
            }
        });

        // Clear error on input
        document.getElementById('username').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);
    </script>
</body>

</html>
